# Mode A Shard B — L2-L13 (12 operators)
# Account: 275201671198 (new)
#
# 12 operators × 13 tasks × 3 agents × 3 reps = 1,404 cases
# Estimated: ~2-3 days, ~$500
#
# Run on EC2:
#   nohup npx tsx scripts/run-pilot3.ts --config config-mode-a-shard-b.yaml > mode-a-shard-b.log 2>&1 &

webarena:
  apps:
    ecommerce:
      url: "http://10.0.1.50:7770"
    ecommerce_admin:
      url: "http://10.0.1.50:7780"
    reddit:
      url: "http://10.0.1.50:9999"
    gitlab:
      url: "http://10.0.1.50:8023"

  tasksPerApp:
    ecommerce_admin: ["4", "41", "94", "198"]
    ecommerce: ["23", "24", "26", "188"]
    reddit: ["29", "67"]
    gitlab: ["132", "293", "308"]

scanner:
  wcagLevels: ["A", "AA"]
  stabilityIntervalMs: 2000
  stabilityTimeoutMs: 15000
  concurrency: 1

variants:
  levels: []
  scoreRanges:
    low:         { min: 0.0,  max: 0.25 }
    medium-low:  { min: 0.25, max: 0.50 }
    base:        { min: 0.40, max: 0.70 }
    high:        { min: 0.75, max: 1.0  }
  individualVariants:
    - ["L2"]
    - ["L3"]
    - ["L4"]
    - ["L5"]
    - ["L6"]
    - ["L7"]
    - ["L8"]
    - ["L9"]
    - ["L10"]
    - ["L11"]
    - ["L12"]
    - ["L13"]

runner:
  repetitions: 3
  maxSteps: 30
  concurrency: 1
  agentConfigs:
    - observationMode: "text-only"
      llmBackend: "claude-sonnet"
      maxSteps: 30
      retryCount: 3
      retryBackoffMs: 1000
      temperature: 0.0
    - observationMode: "vision-only"
      llmBackend: "claude-sonnet-vision"
      maxSteps: 30
      retryCount: 3
      retryBackoffMs: 1000
      temperature: 0.0
    - observationMode: "cua"
      llmBackend: "claude-sonnet"
      maxSteps: 30
      retryCount: 3
      retryBackoffMs: 1000
      temperature: 0.0

recorder:
  waitAfterLoadMs: 10000
  concurrency: 1

output:
  dataDir: "./data/mode-a-shard-b"
  exportFormats: ["json", "csv"]
