# Task Expansion — Llama 4 Maverick text-only (all 13 tasks)
#
# 13 tasks × 4 variants × 5 reps × 1 agent = 260 cases
# Estimated: ~8-12 hours (Llama 4 is more verbose, higher token consumption)
#
# Cross-model replication: if Llama 4 shows same step function as Claude,
# the a11y effect generalizes across model families (closed + open source).
#
# Run on EC2 (overnight):
#   nohup npx tsx scripts/run-pilot3.ts --config config-expansion-llama4.yaml > expansion-llama4.log 2>&1 &

webarena:
  apps:
    ecommerce:
      url: "http://10.0.1.50:7770"
    ecommerce_admin:
      url: "http://10.0.1.50:7780"
    reddit:
      url: "http://10.0.1.50:9999"
    gitlab:
      url: "http://10.0.1.50:8023"

  tasksPerApp:
    ecommerce_admin: ["4", "41", "94", "198"]
    ecommerce: ["23", "24", "26", "188"]
    reddit: ["29", "67"]
    gitlab: ["132", "293", "308"]

scanner:
  wcagLevels: ["A", "AA"]
  stabilityIntervalMs: 2000
  stabilityTimeoutMs: 15000
  concurrency: 1

variants:
  levels: ["low", "medium-low", "base", "high"]
  scoreRanges:
    low:         { min: 0.0,  max: 0.25 }
    medium-low:  { min: 0.25, max: 0.50 }
    base:        { min: 0.40, max: 0.70 }
    high:        { min: 0.75, max: 1.0  }

runner:
  repetitions: 5
  maxSteps: 30
  concurrency: 1
  agentConfigs:
    - observationMode: "text-only"
      llmBackend: "llama4"
      maxSteps: 30
      retryCount: 3
      retryBackoffMs: 1000
      temperature: 0.0

recorder:
  waitAfterLoadMs: 10000
  concurrency: 1

output:
  dataDir: "./data/expansion-llama4"
  exportFormats: ["json", "csv"]
