# Pilot Experiment Config — Track A
# 3 apps × 3 variants × 3 tasks × 2 LLMs × 3 reps = 162 test cases
# (After task screening, replace task IDs with validated ones)

webarena:
  apps:
    ecommerce:
      url: "http://10.0.1.49:7770"
    ecommerce_admin:
      url: "http://10.0.1.49:7780"
    reddit:
      url: "http://10.0.1.49:9999"
    # wikipedia excluded: all tasks require map service (port 3000) which is not deployed
  # Task IDs from webarena/test.raw.json — interleaved, NOT contiguous ranges.
  # Wikipedia excluded: all 16 wikipedia tasks require map service (port 3000)
  # which is not deployed. See regression analysis 2026-04-02.
  tasksPerApp:
    ecommerce_admin: ["0", "1", "2"]
    ecommerce: ["21", "22", "23"]
    reddit: ["27", "28", "29"]

scanner:
  wcagLevels: ["A", "AA"]
  stabilityIntervalMs: 2000
  stabilityTimeoutMs: 15000
  concurrency: 1

variants:
  levels: ["low", "base", "high"]
  scoreRanges:
    low:  { min: 0.0, max: 0.25 }
    base: { min: 0.40, max: 0.70 }
    high: { min: 0.75, max: 1.0 }

runner:
  repetitions: 3
  maxSteps: 30
  concurrency: 1
  agentConfigs:
    - observationMode: "text-only"
      llmBackend: "claude-sonnet"
      maxSteps: 30
      retryCount: 3
      retryBackoffMs: 1000
      temperature: 0.0
    - observationMode: "text-only"
      llmBackend: "claude-haiku"
      maxSteps: 30
      retryCount: 3
      retryBackoffMs: 1000
      temperature: 0.0

recorder:
  waitAfterLoadMs: 10000
  concurrency: 1

output:
  dataDir: "./data/pilot"
  exportFormats: ["json", "csv"]
