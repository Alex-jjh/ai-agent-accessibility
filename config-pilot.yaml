# Pilot Experiment Config — Track A
# 3 apps × 3 variants × 3 tasks × 2 LLMs × 3 reps = 162 test cases
# (After task screening, replace task IDs with validated ones)

webarena:
  apps:
    ecommerce:
      url: "http://10.0.1.49:7770"
    ecommerce_admin:
      url: "http://10.0.1.49:7780"
    reddit:
      url: "http://10.0.1.49:9999"
    wikipedia:
      url: "http://10.0.1.49:8888"
    # gitlab:
    #   url: "http://10.0.1.49:8023"  # Enable after confirming BrowserGym compat
  # Explicit task ID mapping — prevents routing bugs.
  # WebArena task IDs are GLOBAL: ecommerce=3-99, reddit=100-199, wikipedia=400-811.
  # Tasks 0-2 require ecommerce_admin (NOT storefront). Do NOT use them with 'ecommerce'.
  tasksPerApp:
    ecommerce: ["3", "4", "5"]
    ecommerce_admin: ["0", "1", "2"]
    reddit: ["100", "101", "102"]
    wikipedia: ["400", "401", "402"]

scanner:
  wcagLevels: ["A", "AA"]
  stabilityIntervalMs: 2000
  stabilityTimeoutMs: 15000
  concurrency: 1

variants:
  levels: ["low", "base", "high"]
  scoreRanges:
    low:  { min: 0.0, max: 0.25 }
    base: { min: 0.40, max: 0.70 }
    high: { min: 0.75, max: 1.0 }

runner:
  repetitions: 3
  maxSteps: 30
  concurrency: 1
  agentConfigs:
    - observationMode: "text-only"
      llmBackend: "claude-sonnet"
      maxSteps: 30
      retryCount: 3
      retryBackoffMs: 1000
      temperature: 0.0
    - observationMode: "text-only"
      llmBackend: "claude-haiku"
      maxSteps: 30
      retryCount: 3
      retryBackoffMs: 1000
      temperature: 0.0

recorder:
  waitAfterLoadMs: 10000
  concurrency: 1

output:
  dataDir: "./data/pilot"
  exportFormats: ["json", "csv"]
