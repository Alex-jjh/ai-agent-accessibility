# Smoker: Base Solvability Gate — 684 tasks × base × text-only × 5 reps
#
# Purpose: Identify which WebArena tasks are reliably solvable at base
# accessibility (no patches). Tasks passing ≥3/5 majority vote proceed
# to the full AMT manipulation experiment.
#
# Expected: ~3,420 cases, ~$300-400, ~1-2 days wall time
#
# Run on EC2:
#   nohup npx tsx scripts/run-pilot3.ts --config config-smoker-base-solvability.yaml > smoker.log 2>&1 &
#
# After completion:
#   python3 scripts/analyze-smoker.py  (filter base-solvable tasks)
#   → produces config-manipulation-filtered.yaml

webarena:
  apps:
    ecommerce:
      url: "http://10.0.1.50:7770"
    ecommerce_admin:
      url: "http://10.0.1.50:7780"
    reddit:
      url: "http://10.0.1.50:9999"
    gitlab:
      url: "http://10.0.1.50:8023"

  # ALL available tasks (684 total, excluding map/wikipedia)
  # Task IDs are interleaved across sites — use task-site-mapping.json
  tasksPerApp: "all"  # special value: use all string_match tasks from test.raw.json

  # Filter: only string_match eval tasks (no LLM judge dependency)
  evalFilter: "string_match_only"

scanner:
  wcagLevels: ["A", "AA"]
  stabilityIntervalMs: 2000
  stabilityTimeoutMs: 15000
  concurrency: 1

variants:
  levels: ["base"]  # No patches — pure base solvability test
  scoreRanges:
    base: { min: 0.40, max: 0.70 }

runner:
  repetitions: 5
  maxSteps: 30
  concurrency: 1
  agentConfigs:
    - observationMode: "text-only"
      llmBackend: "claude-sonnet"
      maxSteps: 30
      retryCount: 3
      retryBackoffMs: 1000
      temperature: 0.0

recorder:
  waitAfterLoadMs: 10000
  concurrency: 1

output:
  dataDir: "./data/smoker-base-solvability"
  exportFormats: ["json", "csv"]
