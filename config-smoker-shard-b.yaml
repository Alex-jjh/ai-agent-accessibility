# Run on EC2:
#   nohup npx tsx scripts/runners/run-pilot3.ts \
#     --config config-smoker-shard-b.yaml \
#     > smoker-shard-b.log 2>&1 &
#
# Pre-run: reset WebArena Docker containers to ensure clean state.
# See docs/smoker-docker-reset.md.

