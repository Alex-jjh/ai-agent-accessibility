# Mode A CUA Screenshot Rerun — all 26 operators, CUA only
# Account A (190777959793) — after Shard A completes
#
# Purpose: Fix screenshot directory bug (operator IDs now in path).
# Case JSON data already collected; this run only adds proper screenshots.
#
# 26 operators × 13 tasks × 1 CUA agent × 3 reps = 1,014 cases
# Estimated: ~42h, ~$350
#
# Run on EC2:
#   nohup npx tsx scripts/runners/run-pilot3.ts --config config-mode-a-cua-screenshots.yaml > mode-a-cua-rerun.log 2>&1 &

webarena:
  apps:
    ecommerce:
      url: "http://10.0.1.50:7770"
    ecommerce_admin:
      url: "http://10.0.1.50:7780"
    reddit:
      url: "http://10.0.1.50:9999"
    gitlab:
      url: "http://10.0.1.50:8023"

  tasksPerApp:
    ecommerce_admin: ["4", "41", "94", "198"]
    ecommerce: ["23", "24", "26", "188"]
    reddit: ["29", "67"]
    gitlab: ["132", "293", "308"]

scanner:
  wcagLevels: ["A", "AA"]
  stabilityIntervalMs: 2000
  stabilityTimeoutMs: 15000
  concurrency: 1

variants:
  levels: []
  scoreRanges:
    low:         { min: 0.0,  max: 0.25 }
    medium-low:  { min: 0.25, max: 0.50 }
    base:        { min: 0.40, max: 0.70 }
    high:        { min: 0.75, max: 1.0  }
  individualVariants:
    - ["H1"]
    - ["H2"]
    - ["H3"]
    - ["H4"]
    - ["H5a"]
    - ["H5b"]
    - ["H5c"]
    - ["H6"]
    - ["H7"]
    - ["H8"]
    - ["ML1"]
    - ["ML2"]
    - ["ML3"]
    - ["L1"]
    - ["L2"]
    - ["L3"]
    - ["L4"]
    - ["L5"]
    - ["L6"]
    - ["L7"]
    - ["L8"]
    - ["L9"]
    - ["L10"]
    - ["L11"]
    - ["L12"]
    - ["L13"]

runner:
  repetitions: 3
  maxSteps: 30
  concurrency: 1
  agentConfigs:
    - observationMode: "cua"
      llmBackend: "claude-sonnet"
      maxSteps: 30
      retryCount: 3
      retryBackoffMs: 1000
      temperature: 0.0

recorder:
  waitAfterLoadMs: 10000
  concurrency: 1

output:
  dataDir: "./data/mode-a-cua-rerun"
  exportFormats: ["json", "csv"]
