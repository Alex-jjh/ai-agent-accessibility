# GitLab Smoke Test — Task Expansion Phase 1
#
# Verify variant injection works on GitLab (Vue.js DOM).
# 3 tasks × 4 variants × 1 rep × text-only = 12 cases
#
# Risk: Vue.js virtual DOM may conflict with MutationObserver guard.
# READ TRACES after run — verify for each variant:
#   low: ARIA removed, headings→div, links→span in a11y tree
#   base: original DOM, no patches
#   high: aria-label added, landmarks present
#
# Run on EC2:
#   npx tsx scripts/run-pilot3.ts --config config-gitlab-smoke.yaml

webarena:
  apps:
    gitlab:
      url: "http://10.0.1.50:8023"

  tasksPerApp:
    gitlab: ["132", "293", "308"]

scanner:
  wcagLevels: ["A", "AA"]
  stabilityIntervalMs: 2000
  stabilityTimeoutMs: 15000
  concurrency: 1

variants:
  levels: ["low", "medium-low", "base", "high"]
  scoreRanges:
    low:         { min: 0.0,  max: 0.25 }
    medium-low:  { min: 0.25, max: 0.50 }
    base:        { min: 0.40, max: 0.70 }
    high:        { min: 0.75, max: 1.0  }

runner:
  repetitions: 1
  maxSteps: 30
  concurrency: 1
  agentConfigs:
    - observationMode: "text-only"
      llmBackend: "claude-sonnet"
      maxSteps: 30
      retryCount: 3
      retryBackoffMs: 1000
      temperature: 0.0

recorder:
  waitAfterLoadMs: 10000
  concurrency: 1

output:
  dataDir: "./data/gitlab-smoke"
  exportFormats: ["json", "csv"]
