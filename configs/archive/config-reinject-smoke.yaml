# Re-injection smoke test — verify critical scenarios:
#
# 1. ecom:23 low (text-only) — goto() reload must NOT escape variant patches
# 2. ecom:23 base (text-only) — baseline sanity check
# 3. admin:4 base (text-only) — admin not hanging (base variant, no heavy DOM mods)
# 4. reddit:67 base (vision-only) — SoM overlay still works
#
# NOTE: admin:4 low excluded — BrowserGym's intersection_observer hangs on
# heavily modified DOM (431 changes). This is a BrowserGym limitation, not
# our bug. admin:4 low was 0/5 in both Pilot 3a and 3b anyway.
#
# ~8 cases, ~10 min total

webarena:
  apps:
    ecommerce:
      url: "http://10.0.1.50:7770"
    ecommerce_admin:
      url: "http://10.0.1.50:7780"
    reddit:
      url: "http://10.0.1.50:9999"

  tasksPerApp:
    ecommerce_admin: ["4"]
    ecommerce: ["23"]
    reddit: ["67"]

scanner:
  wcagLevels: ["A", "AA"]
  stabilityIntervalMs: 2000
  stabilityTimeoutMs: 15000
  concurrency: 1

variants:
  levels: ["low", "base"]

runner:
  repetitions: 1
  maxSteps: 15
  concurrency: 1
  agentConfigs:
    - observationMode: "text-only"
      llmBackend: "claude-sonnet"
      maxSteps: 15
      retryCount: 3
      retryBackoffMs: 1000
      temperature: 0.0

recorder:
  waitAfterLoadMs: 10000
  concurrency: 1

output:
  dataDir: "./data/reinject-smoke"
  exportFormats: ["json", "csv"]
