# Task Expansion Phase 2 Smoke — Admin + Shopping new tasks
#
# 4 tasks × 4 variants × 1 rep × text-only = 16 cases
# Run AFTER Phase 1 (GitLab) passes.
#
# Run on EC2:
#   npx tsx scripts/run-pilot3.ts --config config-expansion-phase2-smoke.yaml

webarena:
  apps:
    ecommerce:
      url: "http://10.0.1.50:7770"
    ecommerce_admin:
      url: "http://10.0.1.50:7780"

  tasksPerApp:
    ecommerce_admin: ["41", "94", "198"]
    ecommerce: ["124"]

scanner:
  wcagLevels: ["A", "AA"]
  stabilityIntervalMs: 2000
  stabilityTimeoutMs: 15000
  concurrency: 1

variants:
  levels: ["low", "medium-low", "base", "high"]
  scoreRanges:
    low:         { min: 0.0,  max: 0.25 }
    medium-low:  { min: 0.25, max: 0.50 }
    base:        { min: 0.40, max: 0.70 }
    high:        { min: 0.75, max: 1.0  }

runner:
  repetitions: 1
  maxSteps: 30
  concurrency: 1
  agentConfigs:
    - observationMode: "text-only"
      llmBackend: "claude-sonnet"
      maxSteps: 30
      retryCount: 3
      retryBackoffMs: 1000
      temperature: 0.0

recorder:
  waitAfterLoadMs: 10000
  concurrency: 1

output:
  dataDir: "./data/expansion-phase2-smoke"
  exportFormats: ["json", "csv"]
